function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"), 1800);
}

function fmt(v){
  return (Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function fmtDate(d){
  if(!d) return "";
  return new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

async function loadAll(){
  const { data: cmds, error: e1 } = await sb.from("comandas").select("*").order("criada_em",{ascending:false});
  if(e1){ console.error(e1); toast("Erro ao carregar comandas"); return; }
  const { data: itens, error: e2 } = await sb.from("itens").select("*").order("criado_em",{ascending:true});
  if(e2){ console.error(e2); toast("Erro ao carregar itens"); return; }
  const { data: prods, error: e3 } = await sb.from("produtos").select("*").order("nome",{ascending:true});
  if(e3){ console.error(e3); toast("Erro ao carregar produtos"); return; }
  const { data: clis, error: e4 } = await sb.from("clientes").select("*").order("nome",{ascending:true});
  if(e4){ console.error(e4); toast("Erro ao carregar clientes"); return; }
  comandas = cmds.map(c => {
    const its = itens.filter(i => i.comanda_id === c.id);
    const total = its.reduce((s,i)=>s+Number(i.valor),0);
    return {...c, itens: its, total};
  });
  produtos = prods;
  clientes = clis;

  if(sessaoAtual && sessaoAtual.role === "admin"){
    const { data: turnosData, error: e5 } = await sb.rpc("admin_obter_turnos", { p_token: sessaoAtual.token });
    if(e5){ console.error(e5); } else { turnos = turnosData || []; }
  }

  render();
}

async function abrirComanda(nome, celular){
  nome = nome.trim();
  if(!nome) return;
  celular = (celular || "").trim();

  let clienteId = null;
  if(celular){
    const { data: cli, error: e2 } = await sb.from("clientes")
      .upsert({ nome, celular }, { onConflict: "celular" })
      .select("id")
      .single();
    if(e2){ console.error(e2); }
    else { clienteId = cli.id; }
  }

  const { error } = await sb.from("comandas").insert({ nome, status: "aberta", cliente_id: clienteId });
  if(error){
    if(error.code === "23505"){ toast("Já existe uma comanda aberta com esse nome"); }
    else { toast("Erro ao abrir comanda"); console.error(error); }
    return;
  }
  toast("Comanda aberta");
  await loadAll();
}

// ---------- Reconhecimento de voz (compartilhado) ----------
function criarReconhecimentoVoz(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    toast("Seu navegador não suporta reconhecimento de voz.");
    return null;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'pt-BR';
  rec.continuous = false;
  rec.interimResults = false;
  rec.onerror = function(event){
    toast(event.error === "not-allowed"
      ? "Permissão de microfone negada."
      : `Erro no reconhecimento de voz (${event.error}). Se estiver abrindo o arquivo local, hospede em https:// para o microfone funcionar.`);
  };
  return rec;
}

// ---------- Identificação de produto e parsing de linhas em lote ----------
function encontrarProduto(nome){
  const alvo = (nome || "").trim().toLowerCase();
  if(!alvo) return null;
  return produtos.find(p => p.nome.toLowerCase() === alvo)
      || produtos.find(p => p.nome.toLowerCase().startsWith(alvo));
}

function parseLinhaParaItem(linhaOriginal){
  const linha = linhaOriginal.trim();
  if(!linha) return null;

  const matchX = linha.match(/^(.+?)\s*x\s*(\d+)\s*$/i);
  if(matchX){
    const nomeBuscado = matchX[1].trim();
    const qtd = parseInt(matchX[2], 10);
    const prod = encontrarProduto(nomeBuscado);
    if(prod) return { ok:true, produto_id: prod.id, quantidade: qtd, label: `${prod.nome} x${qtd}` };
    return { ok:false, erro: `Produto não encontrado: "${nomeBuscado}"` };
  }

  let descricaoCandidata = linha, valorDigitado = NaN, tinhaSeparador = false;
  for(const sep of [';', '\t', ',']){
    const partes = linha.split(sep);
    if(partes.length === 2){
      descricaoCandidata = partes[0].trim();
      valorDigitado = parseFloat(partes[1].trim().replace(',', '.'));
      tinhaSeparador = true;
      break;
    }
  }

  const prod = encontrarProduto(descricaoCandidata);
  if(prod) return { ok:true, produto_id: prod.id, quantidade: 1, label: prod.nome };

  if(tinhaSeparador){
    if(!isNaN(valorDigitado) && valorDigitado > 0){
      return { ok:true, descricao: descricaoCandidata, valor: valorDigitado, label: descricaoCandidata };
    }
    return { ok:false, erro: `Valor inválido para "${descricaoCandidata}"` };
  }

  return { ok:false, erro: `Não identifiquei "${linha}" (produto não cadastrado e nenhum valor informado)` };
}

async function lancarItensEmLote(comandaId, linhas){
  const itensPayload = [];
  const errosLocais = [];
  linhas.forEach(linha => {
    const r = parseLinhaParaItem(linha);
    if(r === null) return;
    if(r.ok) itensPayload.push(r);
    else errosLocais.push(r.erro);
  });

  if(itensPayload.length === 0){
    toast("Nenhum item válido encontrado." + (errosLocais.length ? " " + errosLocais.join("; ") : ""));
    return;
  }

  const { data, error } = await sb.rpc("lancar_itens_em_lote", {
    p_comanda_id: comandaId,
    p_itens: itensPayload.map(it => it.produto_id
      ? { produto_id: it.produto_id, quantidade: it.quantidade }
      : { descricao: it.descricao, valor: it.valor })
  });
  if(error){ toast("Erro ao lançar itens: " + error.message); console.error(error); return; }

  await loadAll();
  openDetail(comandaId);
  const resumo = data && data[0];
  const erros = [...errosLocais, ...((resumo && resumo.erros) || [])];
  toast(`${(resumo && resumo.adicionados) || 0} item(ns) lançado(s).` + (erros.length ? ` Problemas: ${erros.join('; ')}` : ""));
}

// ---------- Múltiplos itens na comanda (colar em massa / CSV / voz) ----------
window.toggleMultiInput = function(){
  const area = document.getElementById("multi-input-area");
  if(area) area.style.display = area.style.display === "none" ? "block" : "none";
};

window.onAddMultipleItems = async function(comandaId){
  const textarea = document.getElementById("multi-items");
  const raw = textarea.value;
  if(!raw.trim()){ toast("Digite ou cole os itens primeiro."); return; }
  const linhas = raw.split("\n").map(l => l.trim()).filter(Boolean);
  await lancarItensEmLote(comandaId, linhas);
  toggleMultiInput();
  textarea.value = "";
};

window.onImportCSV = async function(comandaId, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    const linhas = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    await lancarItensEmLote(comandaId, linhas);
  };
  reader.readAsText(file, "UTF-8");
  input.value = '';
};

window.startVoiceInput = function(){
  const rec = criarReconhecimentoVoz();
  if(!rec) return;
  rec.onresult = function(event){

window.toggleBulkProdutos = function(){
  const area = document.getElementById("bulk-produtos-area");
  if(area) area.style.display = area.style.display === "none" ? "block" : "none";
};

window.onCadastrarProdutosEmLote = async function(){
  const textarea = document.getElementById("produtos-bulk");
  const raw = textarea.value;
  if(!raw.trim()){ toast("Cole a lista de produtos primeiro."); return; }

  const linhas = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const rows = [];
  const erros = [];
  let categoriaAtual = "Outros";
  linhas.forEach(linha => {
    const headerMatch = linha.match(/^#{1,2}\s*(.+)$/);
    if(headerMatch){ categoriaAtual = headerMatch[1].trim() || "Outros"; return; }

    const partes = linha.split(";").map(s => s.trim());
    if(partes.length < 2){ erros.push(`Linha inválida (use "nome; preço; estoque; mínimo"): "${linha}"`); return; }
    const nome = partes[0];
    const preco = parseFloat(partes[1].replace(",", "."));
    const estoqueNum = partes[2] !== undefined ? parseInt(partes[2], 10) : 0;
    const minimoNum = partes[3] !== undefined ? parseInt(partes[3], 10) : NaN;
    if(!nome || isNaN(preco) || preco < 0){ erros.push(`Preço inválido: "${linha}"`); return; }
    const row = { nome, preco, estoque: isNaN(estoqueNum) ? 0 : estoqueNum, categoria: categoriaAtual };
    if(!isNaN(minimoNum)) row.estoque_minimo = minimoNum;
    rows.push(row);
  });

  if(rows.length === 0){ toast("Nenhum produto válido. " + erros.join("; ")); return; }

  const { data, error } = await sb.rpc("admin_cadastrar_produtos_em_lote", {
    p_token: sessaoAtual.token, p_produtos: rows
  });
  if(error){ toast(error.message || "Erro ao cadastrar produtos"); console.error(error); return; }

  const resultado = data && data[0];
  const adicionados = resultado ? resultado.adicionados : 0;
  const pulados = resultado ? resultado.pulados : 0;
  await loadAll();
  toast(`${adicionados} produto(s) cadastrado(s).`
    + (pulados ? ` ${pulados} já existiam (ignorado).` : "")
    + (erros.length ? ` Problemas: ${erros.join("; ")}` : ""));
  textarea.value = "";
  toggleBulkProdutos();
};

function calcularVendas30dias(){
  const inicio = new Date(Date.now() - 30 * 86400000);

  const pagas = comandas.filter(c => c.status === "paga" && c.fechada_em && new Date(c.fechada_em) >= inicio);
  const porDia = {};
  pagas.forEach(c => {
    const dia = new Date(c.fechada_em).toLocaleDateString("pt-BR");
    porDia[dia] = (porDia[dia] || 0) + c.total;
  });

  const contagemProduto = {};
  comandas.forEach(c => {
    c.itens.forEach(i => {
      if(!i.produto_id) return;
      if(new Date(i.criado_em) < inicio) return;
      contagemProduto[i.produto_id] = (contagemProduto[i.produto_id] || 0) + 1;
    });
  });

  return { porDia, contagemProduto };
}

let chartFaturamento = null;
let chartRanking = null;

function desenharGraficos(){
  const { porDia, contagemProduto } = calcularVendas30dias();

  const dias = Object.keys(porDia).sort((a,b) => {
    const [da,ma,ya] = a.split("/"); const [db,mb,yb] = b.split("/");
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });
  const valores = dias.map(d => porDia[d]);

  const ctxF = document.getElementById("grafico-faturamento");
  if(chartFaturamento) chartFaturamento.destroy();
  if(ctxF){
    chartFaturamento = new Chart(ctxF, {
      type: "line",
      data: { labels: dias, datasets: [{ label: "R$", data: valores, borderColor: "#3f8a4c", backgroundColor: "rgba(63,138,76,.15)", fill: true, tension: .25 }] },
      options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
  }

  const ranking = Object.entries(contagemProduto)
    .map(([produtoId, qtd]) => ({ produto: produtos.find(p => p.id === produtoId), qtd }))
    .filter(r => r.produto)
    .sort((a,b) => b.qtd - a.qtd)
    .slice(0, 10);

  const ctxR = document.getElementById("grafico-ranking");
  if(chartRanking) chartRanking.destroy();
  if(ctxR){
    chartRanking = new Chart(ctxR, {
      type: "bar",
      data: { labels: ranking.map(r => r.produto.nome), datasets: [{ label: "Unidades", data: ranking.map(r => r.qtd), backgroundColor: "#b9791f" }] },
      options: { indexAxis: "y", plugins: { legend: { display: false } } }
    });
  }

  const previsoes = produtos.map(p => {
    const qtdVendida = contagemProduto[p.id] || 0;
    const mediaDiaria = qtdVendida / 30;
    const diasRestantes = mediaDiaria > 0 ? p.estoque / mediaDiaria : Infinity;
    return { produto: p, mediaDiaria, diasRestantes };
  }).filter(p => p.mediaDiaria > 0 && p.diasRestantes <= 3)
    .sort((a,b) => a.diasRestantes - b.diasRestantes);

  const area = document.getElementById("reposicao-area");
  if(!area) return;
  if(previsoes.length === 0){
    area.innerHTML = `<div class="empty">Nenhum produto com previsão de acabar nos próximos 3 dias.</div>`;
  } else {
    area.innerHTML = `<div class="muted" style="margin:16px 0 6px;font-weight:700;text-transform:uppercase;font-size:12px;">⚠️ Previsão de reposição</div>` +
      previsoes.map(p => `
        <div class="card paper-card">
          <div class="row">
            <div><strong>${escapeHtml(p.produto.nome)}</strong>
              <div class="muted">vende ~${p.mediaDiaria.toFixed(1)}/dia · estoque atual: ${p.produto.estoque}</div>
            </div>
            <span class="badge badge-fiado">ACABA EM ~${Math.max(0, Math.floor(p.diasRestantes))} DIA(S)</span>
          </div>
        </div>
      `).join("");
  }
}

function diasDesde(data){
  return Math.floor((Date.now() - new Date(data).getTime()) / 86400000);
}

            <div class="muted">desde ${fmtDate(c.fechada_em || c.criada_em)}</div>
          </div>
          <div class="total" style="color:var(--warn)">${fmt(c.total)}</div>
        </div>
        <div class="foot-actions">
          <button class="btn btn-ghost" onclick="openDetail('${c.id}')">Ver itens</button>
          <button class="btn btn-accent" onclick="quitarFiado('${c.id}')">Quitar fiado</button>
        </div>
      </div>
    `).join("");
  }
  app.innerHTML = html;
}

const LABEL_PAGAMENTO = {dinheiro:"Dinheiro", pix:"Pix", cartao:"Cartão", fiado:"Fiado (quitado)"};

function renderHistorico(){
  const pagas = comandas.filter(c => c.status === "paga")
    .sort((a,b)=> new Date(b.fechada_em) - new Date(a.fechada_em));
  if(pagas.length === 0){
    app.innerHTML = `<div class="empty">Nenhuma comanda fechada ainda.</div>`;
    return;
  }

  const grupos = {};
  pagas.forEach(c => {
    const diaKey = new Date(c.fechada_em).toLocaleDateString("pt-BR");
    (grupos[diaKey] = grupos[diaKey] || []).push(c);
  });

  const html = Object.keys(grupos).map(dia => {
    const lista = grupos[dia];
    const totalDia = lista.reduce((s,c)=>s+c.total,0);
    const porForma = {};
    lista.forEach(c => {
      const key = c.forma_pagamento || "-";
      porForma[key] = (porForma[key]||0) + c.total;
    });
    const breakdown = Object.keys(porForma)
      .map(k => `${LABEL_PAGAMENTO[k]||k}: ${fmt(porForma[k])}`)
      .join(" · ");

    const itensHtml = lista.map(c => {
      const label = LABEL_PAGAMENTO[c.forma_pagamento] || c.forma_pagamento || "-";
      return `
      <div class="card paper-card" onclick="openDetail('${c.id}')" style="cursor:pointer;">
        <div class="row">
          <div><strong>${escapeHtml(c.nome)}</strong>
            <div class="muted">${fmtDate(c.fechada_em)} · ${label}</div>
          </div>
          <div class="total">${fmt(c.total)}</div>
        </div>
      </div>`;
    }).join("");

    return `
      <div class="card" style="background:var(--card2);">
        <div class="row">
          <strong>${dia}</strong>
          <span class="total">${fmt(totalDia)}</span>
        </div>
        <div class="muted">${breakdown}</div>
      </div>
      ${itensHtml}
    `;
  }).join("");

  app.innerHTML = html;
}

function renderDetailSheet(){
  let existing = document.getElementById("detail-overlay");
  if(existing) existing.remove();
  if(!openComandaId) return;
  const c = comandas.find(x => x.id === openComandaId);
  if(!c) return;

  const itensHtml = c.itens.length
    ? c.itens.map(i => `
        <div class="item-row">
          <span>${escapeHtml(i.descricao)}</span>
          <span style="display:flex;align-items:center;gap:10px;">
            ${fmt(i.valor)}
            ${c.status === "aberta" ? `<button class="x" onclick="removeItem('${i.id}')">&times;</button>` : ""}
          </span>
        </div>`).join("")
    : `<div class="muted" style="padding:10px 0;">Nenhum item lançado ainda.</div>`;

  const badge = c.status === "fiado" ? `<span class="badge badge-fiado">FIADO</span>`
    : c.status === "paga" ? `<span class="badge badge-paga">PAGA</span>` : "";

  const produtosHtml = c.status === "aberta" && produtos.length ? (() => {
    const grupos = {};
    produtos.forEach(p => {
      const cat = p.categoria || "Outros";
      (grupos[cat] = grupos[cat] || []).push(p);
    });
    const categorias = Object.keys(grupos).sort((a,b) => a.localeCompare(b, 'pt-BR'));
    return `
    <div class="muted" style="margin:10px 0 4px;">Produtos cadastrados</div>
    <div class="card" style="padding:8px 12px;">
      ${categorias.map(cat => `
        <div class="muted" style="font-weight:700;text-transform:uppercase;font-size:11px;margin:8px 0 2px;">${escapeHtml(cat)}</div>
        ${grupos[cat].map(p => `
          <div class="item-row">
            <span>${escapeHtml(p.nome)} <span class="muted">(${fmt(p.preco)})</span></span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span class="muted">${p.estoque <= 0 ? "esgotado" : p.estoque + " rest."}</span>
              <button class="btn btn-accent" style="padding:4px 10px;" ${p.estoque<=0 ? "disabled" : ""} onclick="addProdutoItem('${c.id}','${p.id}')">+</button>
            </span>
          </div>
        `).join("")}
      `).join("")}
    </div>
  `;
  })() : "";

  let actionsHtml = "";
  if(c.status === "aberta"){
    actionsHtml = `
      ${produtosHtml}
      <div class="muted" style="margin:10px 0 4px;">Outro item (avulso)</div>
      <div class="form-row">
        <input id="item-desc" placeholder="Descrição (ex: Cerveja)" />
        <input id="item-valor" placeholder="Valor" inputmode="decimal" style="max-width:100px;" />
        <button class="btn btn-ghost" onclick="startVoiceQuickAdd('${c.id}')" title="Ditar item">🎤</button>
        <button class="btn btn-accent" onclick="onAddItem('${c.id}')">+</button>
      </div>
      <div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:10px;">
        <button class="btn btn-ghost" onclick="toggleMultiInput()" style="width:100%;">📋 Adicionar vários itens de uma vez</button>
        <div id="multi-input-area" style="display:none;margin-top:8px;">
          <textarea id="multi-items" rows="4" placeholder="Um item por linha. Ex:&#10;Cerveja x 3&#10;Porção de batata; 25.00&#10;Refrigerante"></textarea>
          <div class="form-row" style="margin-top:6px;flex-wrap:wrap;">
            <button class="btn btn-accent" onclick="onAddMultipleItems('${c.id}')">Adicionar todos</button>
            <button class="btn btn-ghost" onclick="toggleMultiInput()">Cancelar</button>
            <button class="btn btn-ghost" onclick="startVoiceInput()">🎤 Ditar</button>
            <label class="btn btn-ghost" style="text-align:center;cursor:pointer;">
              📂 Importar CSV
              <input type="file" accept=".csv,.txt" onchange="onImportCSV('${c.id}', this)" style="display:none;">
            </label>
          </div>
          <div class="help-box">
            Formatos aceitos por linha: <code>produto x quantidade</code> (baixa estoque) · <code>produto</code> sozinho, se já cadastrado (baixa 1 do estoque) · <code>descrição; valor</code> pra item avulso sem controle de estoque.
          </div>
        </div>
      </div>
      <div class="payopts">
        <button class="btn btn-ghost" onclick="fecharComPagamento('${c.id}','dinheiro')">💵 Dinheiro</button>
        <button class="btn btn-ghost" onclick="fecharComPagamento('${c.id}','pix')">📱 Pix</button>
        <button class="btn btn-ghost" onclick="fecharComPagamento('${c.id}','cartao')">💳 Cartão</button>
      </div>
      <button class="btn btn-warn" style="width:100%" onclick="marcarFiado('${c.id}')">Fechar como Fiado</button>
    `;
  } else if(c.status === "fiado"){
    actionsHtml = `<button class="btn btn-accent" style="width:100%" onclick="quitarFiado('${c.id}')">Quitar fiado</button>`;
  } else {
    actionsHtml = `<button class="btn btn-ghost" style="width:100%" onclick="reabrirComanda('${c.id}')">Reabrir comanda</button>`;
  }

  const html = `
    <div class="overlay" id="detail-overlay" onclick="if(event.target===this) closeDetail()">
      <div class="sheet">
        <div class="row">
          <h2>${escapeHtml(c.nome)} ${badge}</h2>
          <button class="x" onclick="closeDetail()">&times;</button>
        </div>
        <div class="muted" style="margin-bottom:10px;">Aberta em ${fmtDate(c.criada_em)}</div>
        <div class="card" style="padding:10px 14px;">${itensHtml}</div>
        <div class="row" style="margin:12px 0;">
          <strong>Total</strong>
          <span class="total">${fmt(c.total)}</span>
        </div>
        ${actionsHtml}
        ${sessaoAtual.role === "admin" ? `<button class="btn btn-danger" style="width:100%;margin-top:8px;" onclick="excluirComanda('${c.id}')">Excluir comanda</button>` : ""}
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML("beforeend", html);
  const descInp = document.getElementById("item-desc");
  if(descInp){
    descInp.addEventListener("keydown", e => { if(e.key === "Enter") document.getElementById("item-valor").focus(); });
    document.getElementById("item-valor").addEventListener("keydown", e => { if(e.key === "Enter") onAddItem(c.id); });
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

// ---------- Event handlers exposed globally ----------
window.onAbrirComanda = () => {
  const inp = document.getElementById("novo-nome");
  const cel = document.getElementById("novo-celular");
  abrirComanda(inp.value, cel.value);
  inp.value = ""; cel.value = "";
};
window.onAddItem = (comandaId) => {
  const desc = document.getElementById("item-desc");
  const valor = document.getElementById("item-valor");
  addItem(comandaId, desc.value, valor.value);
  desc.value = ""; valor.value = "";
  desc.focus();
};
window.openDetail = (id) => { openComandaId = id; renderDetailSheet(); };
window.closeDetail = () => { openComandaId = null; renderDetailSheet(); };
window.removeItem = removeItem;
window.fecharComPagamento = fecharComPagamento;
window.marcarFiado = marcarFiado;
window.quitarFiado = quitarFiado;
window.reabrirComanda = reabrirComanda;
window.excluirComanda = excluirComanda;
window.addProdutoItem = addProdutoItem;
window.ajustarEstoque = ajustarEstoque;
window.excluirProduto = excluirProduto;
window.onCadastrarProduto = () => {
  const nome = document.getElementById("prod-nome");
  const preco = document.getElementById("prod-preco");
  const estoque = document.getElementById("prod-estoque");
  const minimo = document.getElementById("prod-minimo");
  const categoria = document.getElementById("prod-categoria");
  cadastrarProduto(nome.value, preco.value, estoque.value, minimo.value, categoria.value);
  nome.value = ""; preco.value = ""; estoque.value = ""; minimo.value = ""; categoria.value = "";
};
window.onReporEstoque = (produtoId) => {
  const inp = document.getElementById(`repor-${produtoId}`);
  const qtd = parseInt(inp.value, 10);
  if(!qtd || qtd <= 0){ toast("Informe uma quantidade válida"); return; }
  ajustarEstoque(produtoId, qtd);
  inp.value = "";
};
window.excluirCliente = excluirCliente;
window.onCadastrarCliente = () => {
  const nome = document.getElementById("cli-nome");
  const whatsapp = document.getElementById("cli-whatsapp");
  cadastrarCliente(nome.value, whatsapp.value);
  nome.value = ""; whatsapp.value = "";
};

// ---------- Autenticação ----------
const SESSION_KEY = "bar_sessao";
let realtimeStarted = false;

function renderNav(){
  const navEl = document.getElementById("nav-tabs");
  const abas = [
    { id: "abertas", label: "Abertas" },
    { id: "fiado", label: "Fiado" },
    { id: "clientes", label: "Clientes" },
    { id: "estoque", label: "Estoque" },
  ];
  if(sessaoAtual.role === "admin"){
    abas.push({ id: "historico", label: "Histórico" });
    abas.push({ id: "admin", label: "Admin" });
  }
  tab = "abertas";
  navEl.innerHTML = abas.map((a,i) => `<button data-tab="${a.id}" class="${i===0?'active':''}">${a.label}</button>`).join("");
  navEl.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      tab = btn.dataset.tab;
      navEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });
  const badge = document.getElementById("role-badge");
  if(badge) badge.textContent = sessaoAtual.usuario ? `${sessaoAtual.usuario} (${sessaoAtual.role})` : "";
}

function startApp(){
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-shell").style.display = "block";
  renderNav();
  if(!realtimeStarted){
    realtimeStarted = true;
    sb.channel("comandas-sync")
      .on("postgres_changes", { event: "*", schema: "public", table: "comandas" }, loadAll)
      .on("postgres_changes", { event: "*", schema: "public", table: "itens" }, loadAll)
      .on("postgres_changes", { event: "*", schema: "public", table: "produtos" }, loadAll)
      .on("postgres_changes", { event: "*", schema: "public", table: "clientes" }, loadAll)
      .subscribe();
  }
  loadAll();
}

function showLogin(){
  document.getElementById("app-shell").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

window.onLogin = async () => {
  const usuario = document.getElementById("login-usuario").value.trim();
  const senha = document.getElementById("login-senha").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  if(!usuario || !senha){ errEl.textContent = "Preencha usuário e senha"; return; }
  const { data, error } = await sb.rpc("criar_sessao", { p_usuario: usuario, p_senha: senha });
  if(error){
    errEl.textContent = /tentativas/i.test(error.message||"") ? error.message : "Erro ao verificar login";
    console.error(error);
    return;
  }
  if(data && data.length){
    const { token, expira_em, role } = data[0];
    localStorage.setItem(SESSION_KEY, JSON.stringify({ token, expira_em, usuario, role }));
    sessaoAtual = { token, role, usuario };
    document.getElementById("login-senha").value = "";
    startApp();
  } else {
    errEl.textContent = "Usuário ou senha incorretos";
  }
};

window.onLogout = async () => {
  const sessao = getSessao();
  localStorage.removeItem(SESSION_KEY);
  sessaoAtual = null;
  if(sessao){ await sb.rpc("encerrar_sessao", { p_token: sessao.token }); }
  showLogin();
};

// Permite logar com Enter
["login-usuario","login-senha"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => { if(e.key === "Enter") onLogin(); });
});

function getSessao(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch{
    return null;
  }
}

async function initAuth(){
  const sessao = getSessao();
  if(!sessao || !sessao.token){ showLogin(); return; }
  const { data, error } = await sb.rpc("validar_sessao", { p_token: sessao.token });
  const resultado = data && data[0];
  if(error || !resultado || resultado.valido !== true){
    localStorage.removeItem(SESSION_KEY);
    showLogin();
    return;
  }
  sessaoAtual = { token: sessao.token, role: resultado.role, usuario: sessao.usuario };
  startApp();
}

initAuth();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(err => console.error("Erro ao registrar service worker", err));
  });
}
</script>
